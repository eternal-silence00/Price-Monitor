name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      db_test:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pricemonitor_test
        ports:
          - 5433:5432
      
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/price_monitor
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: testsecretkey
          ALGORITHM: HS256
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: testpassword
          MAIL_FROM: test@test.com
          MAIL_SERVER: smtp.gmail.com
          MAIL_PORT: 587
        run: pytest tests/ -v